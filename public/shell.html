<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kylrix · The Sovereign Agentic OS</title>
    <style>
        :root {
            --bg-black: #000000;
            --surface-ash: #161514;
            --border-hairline: rgba(255, 255, 255, 0.08);
            --accent-primary: #6366F1;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-black);
            color: white;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        /* Pure CSS Skeleton Shell */
        .kylrix-shell {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            contain: layout size style;
        }

        .shell-topbar {
            height: 56px;
            background-color: var(--bg-black);
            border-bottom: 1px solid var(--border-hairline);
            display: flex;
            align-items: center;
            padding: 0 16px;
            contain: layout size style;
        }

        .shell-main {
            display: flex;
            flex: 1;
            overflow: hidden;
            contain: layout size style;
        }

        .shell-sidebar {
            width: 240px;
            background-color: var(--bg-black);
            border-right: 1px solid var(--border-hairline);
            display: none;
            contain: layout size style;
        }

        @media (min-width: 1024px) {
            .shell-sidebar {
                display: block;
            }
        }

        .shell-content {
            flex: 1;
            background-color: var(--bg-black);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            contain: layout size style;
        }

        .shell-bottombar {
            height: 64px;
            background-color: var(--surface-ash);
            border-top: 1px solid var(--border-hairline);
            display: flex;
            align-items: center;
            justify-content: space-around;
            contain: layout size style;
        }

        @media (min-width: 1024px) {
            .shell-bottombar {
                display: none;
            }
        }

        /* Nexus Skeleton Pulse */
        .skeleton-rect {
            background: linear-gradient(90deg, #121212 25%, #1c1c1c 50%, #121212 75%);
            background-size: 200% 100%;
            animation: visual-fade 1.5s infinite ease-in-out;
            border-radius: 8px;
        }

        @keyframes visual-fade {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .logo-placeholder {
            width: 32px;
            height: 32px;
            background-color: var(--accent-primary);
            border-radius: 6px;
        }

        .loading-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(99, 102, 241, 0.1);
            border-top: 3px solid var(--accent-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="kylrix-shell">
        <div class="shell-topbar">
            <div class="logo-placeholder"></div>
            <div style="margin-left: 12px; width: 120px; height: 16px;" class="skeleton-rect"></div>
        </div>
        <div class="shell-main">
            <div class="shell-sidebar">
                <div style="padding: 20px; display: flex; flex-direction: column; gap: 16px;">
                    <div style="width: 100%; height: 32px;" class="skeleton-rect"></div>
                    <div style="width: 100%; height: 32px;" class="skeleton-rect"></div>
                    <div style="width: 100%; height: 32px;" class="skeleton-rect"></div>
                    <div style="width: 100%; height: 32px;" class="skeleton-rect"></div>
                </div>
            </div>
            <div class="shell-content">
                <div style="width: 200px; height: 32px;" class="skeleton-rect"></div>
                <div style="width: 100%; height: 200px;" class="skeleton-rect"></div>
                <div style="width: 80%; height: 24px;" class="skeleton-rect"></div>
                <div style="width: 60%; height: 24px;" class="skeleton-rect"></div>
            </div>
        </div>
        <div class="shell-bottombar">
            <div style="width: 24px; height: 24px;" class="skeleton-rect"></div>
            <div style="width: 24px; height: 24px;" class="skeleton-rect"></div>
            <div style="width: 24px; height: 24px;" class="skeleton-rect"></div>
        </div>
    </div>

    <div class="loading-container">
        <div class="spinner"></div>
    </div>

    <script>
        // Redirect to the actual requested route once hydration starts
        // The Service Worker handles serving this shell for any navigation request.
        // Once the real JS bundles load, Next.js will take over.
    </script>
</body>
</html>
